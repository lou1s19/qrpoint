<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface": "#faf8ff",
                    "surface-dim": "#d2d9f4",
                    "on-tertiary-fixed-variant": "#703700",
                    "inverse-primary": "#c0c1ff",
                    "on-primary": "#ffffff",
                    "tertiary": "#904900",
                    "on-primary-container": "#fffbff",
                    "on-secondary-fixed": "#001e2f",
                    "inverse-on-surface": "#eef0ff",
                    "tertiary-fixed-dim": "#ffb783",
                    "error-container": "#ffdad6",
                    "on-primary-fixed-variant": "#2f2ebe",
                    "on-secondary-container": "#004666",
                    "inverse-surface": "#283044",
                    "surface-container": "#eaedff",
                    "secondary-container": "#39b8fd",
                    "on-background": "#131b2e",
                    "on-secondary": "#ffffff",
                    "surface-bright": "#faf8ff",
                    "primary-fixed-dim": "#c0c1ff",
                    "surface-variant": "#dae2fd",
                    "on-tertiary-container": "#fffbff",
                    "surface-container-low": "#f2f3ff",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "on-error-container": "#93000a",
                    "on-surface": "#131b2e",
                    "on-secondary-fixed-variant": "#004c6e",
                    "outline": "#767586",
                    "surface-container-high": "#e2e7ff",
                    "secondary-fixed-dim": "#89ceff",
                    "background": "#faf8ff",
                    "primary-fixed": "#e1e0ff",
                    "primary-container": "#6063ee",
                    "tertiary-container": "#b55d00",
                    "on-error": "#ffffff",
                    "on-tertiary-fixed": "#301400",
                    "error": "#ba1a1a",
                    "on-primary-fixed": "#07006c",
                    "surface-tint": "#494bd6",
                    "on-surface-variant": "#464554",
                    "secondary-fixed": "#c9e6ff",
                    "primary": "#4648d4",
                    "outline-variant": "#c7c4d7",
                    "secondary": "#006591",
                    "surface-container-highest": "#dae2fd",
                    "tertiary-fixed": "#ffdcc5"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xs": "4px",
                    "lg": "24px",
                    "base": "4px",
                    "sm": "8px",
                    "md": "16px",
                    "container-padding": "20px",
                    "gutter": "16px",
                    "xl": "32px"
            },
            "fontFamily": {
                    "label-sm": ["Inter"],
                    "body-md": ["Inter"],
                    "headline-sm": ["Inter"],
                    "headline-lg": ["Inter"],
                    "headline-md": ["Inter"],
                    "label-md": ["Inter"],
                    "body-lg": ["Inter"]
            },
            "fontSize": {
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scanner-frame-corner {
            width: 40px;
            height: 40px;
            border-color: #6063ee;
            position: absolute;
        }
        .scanning-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #6063ee, transparent);
            box-shadow: 0 0 15px #6063ee;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-black overflow-hidden font-body-md text-on-surface selection:bg-primary-container">
<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full z-50 bg-transparent border-none shadow-none">
<div class="flex justify-between items-center h-16 px-5 max-w-screen-xl mx-auto">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-black/30 backdrop-blur-md text-white border border-white/10 active:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<span class="text-white font-headline-sm">Scanly</span>
</div>
<div class="flex items-center gap-3">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-black/30 backdrop-blur-md text-white border border-white/10 active:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="flashlight_on">flashlight_on</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-black/30 backdrop-blur-md text-white border border-white/10 active:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="help">help</span>
</button>
</div>
</div>
</header>
<!-- Main Viewfinder Canvas -->
<main class="relative h-screen w-full flex flex-col items-center justify-center">
<!-- Background Camera Feed Placeholder -->
<div class="absolute inset-0 z-0">
<img alt="camera view" class="w-full h-full object-cover brightness-[0.6] grayscale-[0.3]" data-alt="Modern blurred urban interior environment with soft industrial lighting seen through a high-definition camera lens" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAVqTSFSQ6EJk0aKeT8c70dugAhkq1IBLl37HhHtloj4grZOqZr6zjOWYYeMNTnxxZdpAiPqqMYkh0mvIx8SVJ7o-5xXwJbLAOS0C1fo8-6ZtMa96UoPkKNupGmkcGx7B3KNag5rPho8hIN4HqbpLtHn0Wf2Dibu4fEA_prZbm2LwDcj1wNvB3g1d8UBSFr30XVZNNlt6d-D8RSUmqPlro4Kw_8XgjBGSWvgV6SCdHf613JvgfRenmn7Ccg6_SYMEkce9MQT3yd-ElS"/>
</div>
<!-- Scanning Overlay UI -->
<div class="relative z-10 w-full max-w-md px-10 flex flex-col items-center">
<!-- Viewfinder Frame -->
<div class="relative w-full aspect-square max-w-[280px] bg-black/10 rounded-3xl overflow-hidden backdrop-blur-[1px]">
<!-- Corners -->
<div class="scanner-frame-corner top-0 left-0 border-t-4 border-l-4 rounded-tl-2xl"></div>
<div class="scanner-frame-corner top-0 right-0 border-t-4 border-r-4 rounded-tr-2xl"></div>
<div class="scanner-frame-corner bottom-0 left-0 border-b-4 border-l-4 rounded-bl-2xl"></div>
<div class="scanner-frame-corner bottom-0 right-0 border-b-4 border-r-4 rounded-br-2xl"></div>
<!-- Scanning Motion Visual -->
<div class="scanning-line opacity-80"></div>
<!-- Inner Indicator -->
<div class="absolute inset-0 flex items-center justify-center opacity-30">
<span class="material-symbols-outlined text-white text-7xl" data-icon="qr_code_2">qr_code_2</span>
</div>
</div>
<!-- Guidance Text -->
<div class="mt-8 text-center space-y-2">
<p class="text-white font-label-md tracking-wide uppercase">Align QR Code</p>
<p class="text-white/60 font-body-md max-w-[240px]">Position the code within the frame to scan automatically</p>
</div>
<!-- Zoom Slider -->
<div class="mt-12 w-full max-w-[240px] flex items-center gap-4">
<span class="material-symbols-outlined text-white/50 text-sm" data-icon="zoom_out">zoom_out</span>
<div class="flex-1 h-[4px] bg-white/20 rounded-full relative">
<div class="absolute left-0 top-0 h-full w-1/3 bg-primary rounded-full"></div>
<div class="absolute left-1/3 top-1/2 -translate-y-1/2 w-4 h-4 bg-white rounded-full shadow-lg border-2 border-primary"></div>
</div>
<span class="material-symbols-outlined text-white/50 text-sm" data-icon="zoom_in">zoom_in</span>
</div>
</div>
</main>
<!-- Bottom Actions Section -->
<div class="fixed bottom-0 left-0 w-full z-50 pb-safe">
<div class="max-w-screen-xl mx-auto px-5 pb-8 flex flex-col items-center gap-6">
<!-- Gallery Button -->
<button class="flex items-center gap-3 px-8 h-14 bg-white text-on-surface rounded-full shadow-xl hover:bg-surface-container transition-all active:scale-95">
<span class="material-symbols-outlined text-primary" data-icon="image">image</span>
<span class="font-label-md">Select from Gallery</span>
</button>
<!-- Shared Bottom Navigation Structure (Integrated into the specific Scan intent) -->
<nav class="w-full bg-white/95 dark:bg-gray-950/95 backdrop-blur-md rounded-t-3xl border-t border-gray-100 dark:border-gray-800 shadow-[0_-4px_20px_rgba(15,23,42,0.05)] h-20 flex justify-around items-center px-4">
<a class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 hover:text-indigo-500 dark:hover:text-indigo-300 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
<span class="font-['Inter'] text-[11px] font-semibold uppercase tracking-wider">Dashboard</span>
</a>
<!-- ACTIVE STATE: Scan -->
<a class="flex flex-col items-center justify-center text-indigo-600 dark:text-indigo-400 scale-105 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="qr_code_scanner" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
<span class="font-['Inter'] text-[11px] font-semibold uppercase tracking-wider">Scan</span>
</a>
<a class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 hover:text-indigo-500 dark:hover:text-indigo-300 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="add_box">add_box</span>
<span class="font-['Inter'] text-[11px] font-semibold uppercase tracking-wider">Create</span>
</a>
<a class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 hover:text-indigo-500 dark:hover:text-indigo-300 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-['Inter'] text-[11px] font-semibold uppercase tracking-wider">History</span>
</a>
</nav>
</div>
</div>
<!-- Background Vignette for UI Readability -->
<div class="fixed inset-0 pointer-events-none z-[5] bg-gradient-to-t from-black/80 via-transparent to-black/40"></div>
</body></html>
