<h1 class="text-xl font-extrabold tracking-tight text-gray-900 dark:text-white">Scanly</h1>
<div class="flex items-center">
<button class="p-2 hover:bg-gray-50 dark:hover:bg-gray-900 transition-colors active:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-gray-500 dark:text-gray-400" data-icon="settings">settings</span>
</button>
</div>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow pt-24 pb-32 px-container-padding max-w-screen-xl mx-auto w-full">
<!-- Live Preview Section -->
<section class="mb-xl flex flex-col items-center">
<div class="relative group">
<div class="w-64 h-64 md:w-80 md:h-80 bg-white p-6 rounded-xl shadow-[0_4px_20px_rgba(15,23,42,0.05)] border border-outline-variant/30 flex items-center justify-center overflow-hidden">
<div class="w-full h-full bg-gradient-to-br from-primary/10 to-transparent absolute inset-0 pointer-events-none"></div>
<!-- Mock QR Code Representation -->
<div class="grid grid-cols-7 grid-rows-7 gap-1 w-full h-full opacity-90">
<!-- Corners -->
<div class="col-start-1 row-start-1 col-span-2 row-span-2 border-4 border-primary rounded-lg"></div>
<div class="col-start-6 row-start-1 col-span-2 row-span-2 border-4 border-primary rounded-lg"></div>
<div class="col-start-1 row-start-6 col-span-2 row-span-2 border-4 border-primary rounded-lg"></div>
<!-- Random bits -->
<div class="col-start-3 row-start-3 bg-primary rounded-sm"></div>
<div class="col-start-4 row-start-1 bg-primary rounded-sm"></div>
<div class="col-start-5 row-start-4 bg-primary rounded-sm"></div>
<div class="col-start-2 row-start-4 bg-primary rounded-sm"></div>
<div class="col-start-4 row-start-6 bg-primary rounded-sm"></div>
<div class="col-start-6 row-start-4 bg-primary rounded-sm"></div>
</div>
</div>
<!-- Viewfinder Corner Accents -->
<div class="absolute -top-2 -left-2 w-6 h-6 border-t-2 border-l-2 border-primary"></div>
<div class="absolute -top-2 -right-2 w-6 h-6 border-t-2 border-r-2 border-primary"></div>
<div class="absolute -bottom-2 -left-2 w-6 h-6 border-b-2 border-l-2 border-primary"></div>
<div class="absolute -bottom-2 -right-2 w-6 h-6 border-b-2 border-r-2 border-primary"></div>
</div>
<p class="mt-md font-label-md text-label-md text-on-surface-variant">Live Preview</p>
</section>
<!-- Tabbed Interface -->
<section class="bg-white rounded-xl shadow-[0_4px_20px_rgba(15,23,42,0.05)] overflow-hidden">
<!-- Tabs Header -->
<div class="flex border-b border-gray-100 overflow-x-auto no-scrollbar">
<button class="flex-1 py-4 px-md font-label-md text-label-md border-b-2 border-primary text-primary whitespace-nowrap">Content</button>
<button class="flex-1 py-4 px-md font-label-md text-label-md border-b-2 border-transparent text-on-surface-variant hover:text-primary transition-colors whitespace-nowrap">Design</button>
<button class="flex-1 py-4 px-md font-label-md text-label-md border-b-2 border-transparent text-on-surface-variant hover:text-primary transition-colors whitespace-nowrap">Colors</button>
<button class="flex-1 py-4 px-md font-label-md text-label-md border-b-2 border-transparent text-on-surface-variant hover:text-primary transition-colors whitespace-nowrap">Logo</button>
</div>
<!-- Tab Content: Content -->
<div class="p-md space-y-md">
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant block">URL OR TEXT</label>
<input class="w-full h-14 px-md rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-md" placeholder="https://example.com" type="text"/>
</div>
<div class="grid grid-cols-2 gap-sm">
<button class="flex items-center justify-center gap-sm p-md rounded-lg bg-surface border border-outline-variant hover:border-primary transition-colors">
<span class="material-symbols-outlined text-primary" data-icon="link">link</span>
<span class="font-label-md text-label-md">URL</span>
</button>
<button class="flex items-center justify-center gap-sm p-md rounded-lg bg-surface border border-outline-variant hover:border-primary transition-colors">
<span class="material-symbols-outlined text-primary" data-icon="wifi">wifi</span>
<span class="font-label-md text-label-md">WiFi</span>
</button>
</div>
</div>
<!-- Design & Other features represented in an asymmetric/modern grid -->
<div class="px-md pb-md">
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div class="p-md rounded-xl bg-surface-container-low border border-outline-variant/30">
<div class="flex items-center justify-between mb-sm">
<span class="font-label-md text-label-md">Pattern Style</span>
<span class="font-label-sm text-label-sm text-primary">Dots</span>
</div>
<div class="flex gap-sm">
<div class="w-10 h-10 rounded bg-primary/20 flex items-center justify-center cursor-pointer border-2 border-primary">

</div>
<div class="w-10 h-10 rounded bg-white flex items-center justify-center cursor-pointer border border-outline-variant">
<div class="w-4 h-4 bg-gray-400"></div>
</div>
<div class="w-10 h-10 rounded bg-white flex items-center justify-center cursor-pointer border border-outline-variant">

</div>
</div>
</div>
<div class="p-md rounded-xl bg-surface-container-low border border-outline-variant/30">
<div class="flex items-center justify-between mb-sm">
<span class="font-label-md text-label-md">Logo Size</span>
<span class="font-label-sm text-label-sm text-primary">40%</span>
</div>
<input class="w-full h-1 bg-outline-variant rounded-full appearance-none cursor-pointer accent-primary" type="range"/>
</div>
</div>
</div>
</section>
<!-- Primary Action -->
<div class="mt-lg">
<button class="w-full h-[56px] bg-primary text-white font-headline-sm rounded-xl shadow-lg hover:shadow-xl hover:opacity-95 transition-all flex items-center justify-center gap-sm">
<span class="material-symbols-outlined" data-icon="download">download</span>
                Save &amp; Export
            </button>
</div>

<span class="font-['Inter'] text-[11px] font-semibold uppercase tracking-wider">Dashboard</span>
